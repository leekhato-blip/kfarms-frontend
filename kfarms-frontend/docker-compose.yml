services:
  postgres:
    image: postgres:16-alpine
    container_name: kfarms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kfarms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ${KFARMS_BACKEND_BUILD_CONTEXT:-/home/lee/Documents/kfarms-backend}
    container_name: kfarms-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: false
      LOGGING_LEVEL_HIBERNATE_SQL: WARN
      LOGGING_LEVEL_HIBERNATE_BIND: WARN
      LOGGING_LEVEL_HIBERNATE_DESCRIPTOR: WARN
      KFARMS_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KFARMS_DB_USERNAME: ${POSTGRES_USER}
      KFARMS_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KFARMS_FRONTEND_BASE_URL: ${KFARMS_PUBLIC_URL}
      KFARMS_JWT_SECRET: ${KFARMS_JWT_SECRET}
      KFARMS_COOKIE_SECURE: ${KFARMS_COOKIE_SECURE}
      KFARMS_COOKIE_SAMESITE: ${KFARMS_COOKIE_SAMESITE}
      KFARMS_COOKIE_DOMAIN: ${KFARMS_COOKIE_DOMAIN}
      KFARMS_COOKIE_MAX_AGE_DAYS: ${KFARMS_COOKIE_MAX_AGE_DAYS}
      KFARMS_CORS_ALLOWED_ORIGINS: ${KFARMS_CORS_ALLOWED_ORIGINS}
      KFARMS_CORS_ALLOWED_ORIGIN_PATTERNS: ${KFARMS_CORS_ALLOWED_ORIGIN_PATTERNS}
      KFARMS_SMTP_HOST: ${KFARMS_SMTP_HOST}
      KFARMS_SMTP_PORT: ${KFARMS_SMTP_PORT}
      KFARMS_SMTP_USERNAME: ${KFARMS_SMTP_USERNAME}
      KFARMS_SMTP_PASSWORD: ${KFARMS_SMTP_PASSWORD}
      KFARMS_SMS_ENABLED: ${KFARMS_SMS_ENABLED}
      KFARMS_SMS_WEBHOOK_URL: ${KFARMS_SMS_WEBHOOK_URL}
      KFARMS_SMS_API_KEY: ${KFARMS_SMS_API_KEY}
      KFARMS_SMS_SENDER: ${KFARMS_SMS_SENDER}
      KFARMS_SMS_PREVIEW_LOGGING_ENABLED: ${KFARMS_SMS_PREVIEW_LOGGING_ENABLED}
      KFARMS_AUTH_VERIFICATION_PREVIEW_ENABLED: ${KFARMS_AUTH_VERIFICATION_PREVIEW_ENABLED}
      KFARMS_PAYSTACK_ENABLED: ${KFARMS_PAYSTACK_ENABLED}
      KFARMS_PAYSTACK_SECRET_KEY: ${KFARMS_PAYSTACK_SECRET_KEY}
      KFARMS_PAYSTACK_PRO_MONTHLY_PLAN_CODE: ${KFARMS_PAYSTACK_PRO_MONTHLY_PLAN_CODE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
    container_name: kfarms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  kfarms-postgres-data:
