<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KFarms</title>
    <script>
      (function () {
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;
        try {
          window.sessionStorage.setItem("kf_spa_redirect", redirectPath);
        } catch (error) {
          console.warn("Unable to save pending route", error);
        }
        window.location.replace("/");
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #071226;
        color: #e5eefc;
        font: 500 16px/1.4 Inter, system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    Returning you to KFarms...
  </body>
</html>
